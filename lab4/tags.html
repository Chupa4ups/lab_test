<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../main.css">
        <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
        <link rel="icon" href="favicon 32x32">
        <link rel="icon" href="favicon 48x48">
        <title>Крюков В.А.</title>
        <meta charset="UTF-8">
    </head>

    <title>Облако тегов</title>

    <style>
        .container {
            position: relative;
            width: 100%;
            height: 600px;
        }

        .tag {
            position: absolute;
            padding: 5px 10px;
            color: white;
            border-radius: 5px;
            transition: 0.3s;
            animation: move 6s infinite alternate;
        }

        .tag:hover {
            transform: scale(1.4);
            z-index: 10;
            box-shadow: 0 0 10px black;
            animation-play-state: paused;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to   { transform: translate(20px, -20px); }
        }

        .t1 { top: 50px; left: 100px; background: red; font-size: 14px; }
        .t2 { top: 150px; left: 300px; background: blue; font-size: 20px; }
        .t3 { top: 250px; left: 200px; background: green; font-size: 16px; }
        .t4 { top: 100px; left: 500px; background: purple; font-size: 18px; }
        .t5 { top: 300px; left: 100px; background: orange; }

        .t6 { top: 400px; left: 250px; background: teal; }
        .t7 { top: 200px; left: 600px; background: brown; }
        .t8 { top: 350px; left: 450px; background: pink; }
        .t9 { top: 50px; left: 700px; background: gray; }
        .t10 { top: 450px; left: 600px; background: black; }

        .t11 { top: 100px; left: 50px; background: navy; }
        .t12 { top: 500px; left: 300px; background: darkgreen; }
        .t13 { top: 250px; left: 700px; background: crimson; }
        .t14 { top: 350px; left: 50px; background: gold; color: black; }
        .t15 { top: 20px; left: 400px; background: darkblue; }

    </style>

    <body>

        <div class="container">
            <div class="tag t1">CSS</div>
            <div class="tag t2">position</div>
            <div class="tag t3">absolute</div>
            <div class="tag t4">relative</div>
            <div class="tag t5">z-index</div>

            <div class="tag t6">flex</div>
            <div class="tag t7">grid</div>
            <div class="tag t8">margin</div>
            <div class="tag t9">padding</div>
            <div class="tag t10">border</div>

            <div class="tag t11">overflow</div>
            <div class="tag t12">transform</div>
            <div class="tag t13">animation</div>
            <div class="tag t14">hover</div>
            <div class="tag t15">display</div>
        </div>

    </body>
</html>
