<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../main.css">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon 32x32">
    <link rel="icon" href="favicon 48x48">
    <title>progress</title>
    <meta charset="UTF-8">
</head>

    <title>Панель прогресса</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .wrapper {
            border: 2px solid black;
            background-color: rgb(85, 103, 126);
            padding: 20px;
            text-align: center;
            width: 350px;
            border-radius: 10px;
        }

        h3 {
            margin-bottom: 15px;
        }

        .progress-container {
            width: 100%;
            height: 30px;
            border: 2px solid black;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: rgb(43, 159, 43);
        }

        .wrapper:active .progress-bar {
            animation: load 3s linear forwards;
        }

        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>

    <body>
        <div class="wrapper">
            <h3>Степень прогресса</h3>

            <button>Нажмите и удерживайте</button>

            <div class="progress-container">
            <div class="progress-bar"></div>
            </div>
        </div>

    </body>
</html>
