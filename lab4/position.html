<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../main.css">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon 32x32">
    <link rel="icon" href="favicon 48x48">
    <title>Крюков Василий Александрович.</title>
    <style>
        div {
            width: 300px;
            height: 70px;
            line-height: 70%;
            text-align: center;
            background-color: white;
            border: 1px dotted darkgreen;
            margin: 15px;
        }
        .position-relative {
            position: relative;
            left: 140px;
            top: -120px;
            z-index: -1;
        }
        main {
            position: relative;
            z-index: 0;
        }
        .position-absolute {
            position: absolute;
            left: 300px;
        }
        .absolute1 {
            position: absolute;
            left: 700px;
            top: 280px;
        }

        .absolute2 {
            position: absolute;
            left: 299px;
            top: 220px;
        }

        .absolute3 {
            position: absolute;
            left: 370px;
            top: 310px;
        }
        .absolute4 {
            position: absolute;
            left: 500px;
            top: 240px;
        }

        
        .absolute1,
        .absolute2,
        .absolute3,
        .absolute4 {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .absolute1:hover,
        .absolute2:hover,
        .absolute3:hover,
        .absolute4:hover {
            transform: scale(1.1);
            background-color: rgb(64, 139, 164);
            z-index: 10;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <header>
        НГТУ, ФБ, Лабораторная работа 4
    </header>
        <main>
            <div>static</div>
            <div>static</div>
            <div class="position-relative">relative</div>
            <div>static</div>
            <div>static</div>
            <div class="absolute1">absolute 1</div>
            <div class="absolute2">absolute 2</div>
            <div class="absolute3">absolute 3</div>
            <div class="absolute4">absolute 4</div>
            <div>static</div>
        </main>

    <footer>
        &copy; Крюков Василий, ФБИ-41, 2 курс, 2026
    </footer>
</body>
</html>
